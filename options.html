<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; padding: 32px; max-width: 440px; }
    h2   { font-size: 18px; margin-bottom: 6px; }
    p.intro { font-size: 13px; color: #666; margin-bottom: 24px; }
    .veld { margin-bottom: 20px; }
    label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 6px; }
    input {
      width: 100%; padding: 8px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 13px; box-sizing: border-box;
    }
    .hint { font-size: 11px; color: #888; margin-top: 4px; }
    button {
      padding: 9px 22px; background: #1a1a1a; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    #msg { margin-top: 10px; font-size: 12px; color: green; }
  </style>
</head>
<body>
  <h2>ContextReader instellingen</h2>
  <p class="intro">Beide sleutels worden alleen lokaal opgeslagen.</p>

  <div class="veld">
    <label>Anthropic API-sleutel (context-analyse)</label>
    <input type="password" id="claude-key" placeholder="sk-ant-…">
    <p class="hint">Aanvragen via <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
  </div>

  <div class="veld">
    <label>ElevenLabs API-sleutel (stem)</label>
    <input type="password" id="elevenlabs-key" placeholder="sk_…">
    <p class="hint">Aanvragen via <a href="https://elevenlabs.io" target="_blank">elevenlabs.io</a> — gratis tier: 10.000 tekens/maand</p>
  </div>

  <button id="opslaan">Opslaan</button>
  <div id="msg"></div>
  <script src="options.js"></script>
</body>
</html>
