<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 16px;
      margin: 0;
      background: #fff;
      color: #1a1a1a;
    }
    h2 { font-size: 15px; margin: 0 0 12px; font-weight: 600; }
    #genre-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #f0f0f0;
      display: inline-block;
      margin-bottom: 12px;
    }
    #genre-reden { font-size: 11px; color: #666; margin-bottom: 14px; }
    select {
      width: 100%; padding: 6px 8px; border-radius: 6px;
      border: 1px solid #ddd; font-size: 13px; margin-bottom: 12px;
    }
    .knoppen { display: flex; gap: 8px; }
    button {
      flex: 1; padding: 8px; border-radius: 8px; border: none;
      font-size: 13px; cursor: pointer; font-weight: 500;
    }
    #btn-play  { background: #1a1a1a; color: #fff; }
    #btn-pause { background: #f0f0f0; color: #1a1a1a; }
    #btn-stop  { background: #fee2e2; color: #991b1b; }
    #status { font-size: 11px; color: #888; margin-top: 10px; text-align: center; }
    a { font-size: 11px; color: #888; display: block; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Context Reader</h2>
  <div id="genre-badge">Analyseren…</div>
  <div id="genre-reden"></div>

  <select id="profiel-select">
    <option value="auto">Automatisch (AI)</option>
    <option value="default">Neutraal</option>
    <option value="horror">Horror</option>
    <option value="nieuws">Nieuws</option>
    <option value="tech">Tech</option>
    <option value="fictie">Fictie</option>
    <option value="poëzie">Poëzie</option>
  </select>

  <div class="knoppen">
    <button id="btn-play">Voorlezen</button>
    <button id="btn-pause">Pauze</button>
    <button id="btn-stop">Stop</button>
  </div>
  <div id="status"></div>
  <a href="#" id="link-options">API-sleutel instellen</a>

  <script src="popup.js"></script>
</body>
</html>
