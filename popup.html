<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
</head>

<body>
  <h2>Human Voice Screen Reader</h2>

  <div id="genre-badge">Analyseren…</div>
  <div id="genre-reden"></div>

  <select id="profiel-select">
    <option value="auto">Automatisch (AI)</option>
    <option value="default">Neutraal</option>
    <option value="horror">Horror</option>
    <option value="nieuws">Nieuws</option>
    <option value="tech">Tech</option>
    <option value="fictie">Fictie</option>
    <option value="poëzie">Poëzie</option>
  </select>

  <!-- SPEED CONTROL (nieuw) -->
  <select id="speed-select">
    <option value="1">1x</option>
    <option value="1.25">1.25x</option>
    <option value="1.5">1.5x</option>
    <option value="1.75">1.75x</option>
    <option value="2">2x</option>
    <option value="2.25">2.25x</option>
    <option value="2.5">2.5x</option>
  </select>

  <button id="btn-summary">Hoor samenvatting</button>

  <div class="knoppen">
    <button id="btn-play">Voorlezen</button>
    <button id="btn-pause">Pauze</button>
    <button id="btn-stop">Stop</button>
  </div>

  <div id="status"></div>

  <div id="shortcuts-hint">
    Alt+Shift+R = start &nbsp;|&nbsp; Alt+Shift+P = pauze &nbsp;|&nbsp; Alt+Shift+S = stop
  </div>

  <a href="#" id="link-options">API-sleutel instellen</a>

  <script src="popup.js"></script>
</body>
</html>
